<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureMemo AI - Task Assignment Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Core Theme (Warm Red + Beige) */
            --persian-red: #CA3433;
            --crimson: #B80F0A;
            --maroon: #800000;
            --salmon: #FA8072;
        
            /* Backgrounds */
            --light-beige: #FAF0E6;
            --antique-white: #FAEBD7;
            --white: #FFFFFF;
        
            /* Text */
            --text-dark: #5A5A5A;
            --text-light: #8A8A8A;
        
            /* UI */
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light-beige);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--persian-red);
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px var(--shadow);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: var(--light-beige);
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: var(--white);
            font-size: 1em;
            opacity: 0.95;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message-bubble {
            display: inline-block;
            padding: 15px 20px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            box-shadow: 0 2px 8px var(--shadow);
            text-align: left;
        }

        .message.user .message-bubble {
            background: var(--salmon);
            color: var(--light-beige);
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-bubble {
            background: var(--antique-white);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            max-width: 85%;
        }

        /* Markdown Styling inside agent bubbles */
        .message.agent .message-bubble p {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .message.agent .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message.agent .message-bubble strong {
            color: var(--crimson);
            font-weight: 600;
        }

        .message.agent .message-bubble ul,
        .message.agent .message-bubble ol {
            margin: 8px 0 8px 20px;
        }

        .message.agent .message-bubble li {
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .message.agent .message-bubble h1,
        .message.agent .message-bubble h2,
        .message.agent .message-bubble h3 {
            color: var(--maroon);
            margin: 12px 0 6px 0;
            font-size: 1.05em;
        }

        .message.agent .message-bubble code {
            background: var(--antique-white);
            color: var(--maroon);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* Thinking Bubble */
        .thinking-bubble {
            display: inline-block;
            padding: 15px 20px;
            border-radius: 18px;
            background: var(--antique-white);
            color: var(--text-dark);
            box-shadow: 0 2px 8px var(--shadow);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .thinking-dots {
            display: inline-block;
            margin-left: 5px;
        }

        .thinking-dots span {
            animation: blink 1.4s infinite;
            font-size: 1.2em;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 20%, 50%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        /* Results Table */
        .results-table {
            margin-top: 15px;
            width: 100%;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .results-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th {
            background: var(--persian-red);
            color: var(--light-beige);
        }

        .results-table td {
            padding: 12px;
            border-bottom: 1px solid var(--light-beige);
            font-size: 0.9em;
        }

        .results-table tr:last-child td { border-bottom: none; }
        .results-table tr:nth-child(even) { background: var(--light-beige); }
        .results-table tr:hover {
            background: var(--salmon);
            transition: background 0.2s ease;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 15px;
            background: var(--light-beige);
            border-radius: 15px;
            box-shadow: 0 -2px 10px var(--shadow);
        }

        .input-area input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--crimson);
            border-radius: 12px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
            background: var(--white);
        }

        .input-area input:focus {
            border-color: var(--crimson);
            box-shadow: 0 0 0 3px rgba(179, 153, 211, 0.1);
        }

        .input-area button {
            padding: 15px 30px;
            background: var(--crimson);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .input-area button:active { transform: translateY(0); }

        .input-area button:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }

        /* Scrollbar Styling */
        .messages-area::-webkit-scrollbar { width: 8px; }
        .messages-area::-webkit-scrollbar-track {
            background: var(--light-beige);
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--persian-red);
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb:hover { background: var(--salmon); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--maroon);
        }

        .empty-state p { font-size: 1em; }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header h1 { font-size: 1.5em; }
            .message-bubble { max-width: 85%; }
            .results-table { font-size: 0.85em; }
            .results-table th,
            .results-table td { padding: 10px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="SecureMemo-AI-Logo1-Transparent.png" style="float: left;" alt="SecureMemo AI Logo" width="150" height="150">
            <h1>SecureMemo AI</h1>
            <p>Secure Task Assignment Assistant</p>
        </div>

        <!-- Chat Container -->
        <div class="chat-container">
            <div class="messages-area" id="messagesArea">
                <!-- Empty State -->
                <div class="empty-state">
                    <h3>Welcome to SecureMemo AI!</h3>
                    <p>Ask me to assign employees to tasks, based on positions and access levels, from meeting notes.</p>
                    <p>Query information about projects, meetings, or employees.</p>
                    <p style="margin-top: 15px; font-size: 0.9em;">💡 Try: "Assign employees to tasks from the meeting notes"</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type your query here..."
                    autocomplete="off"
                >
                <button id="sendButton" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://securememo-ai.onrender.com';
        let isProcessing = false;

        // Enable sending with Enter key
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isProcessing) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;

            isProcessing = true;
            document.getElementById('sendButton').disabled = true;

            // Clear empty state if present
            const emptyState = document.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Add thinking bubble
            const thinkingId = addThinkingBubble();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                removeThinkingBubble(thinkingId);
                addMessage(data.response, 'agent', data.assignments);

            } catch (error) {
                removeThinkingBubble(thinkingId);
                addMessage('Sorry, I encountered an error. Please make sure the server is running.', 'agent');
                console.error('Error:', error);
            }

            isProcessing = false;
            document.getElementById('sendButton').disabled = false;
        }

        function addMessage(text, sender, assignments = null) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (sender === 'agent') {
                bubble.innerHTML = marked.parse(text, { breaks: true, gfm: true });
            
                if (assignments && assignments.length > 0) {
                    const separator = document.createElement('hr');
                    separator.style.margin = '20px 0';
                    separator.style.border = 'none';
                    separator.style.borderTop = '2px solid var(--crimson)';
                    bubble.appendChild(separator);
            
                    const tableTitle = document.createElement('h3');
                    tableTitle.textContent = 'Task Assignment Summary';
                    tableTitle.style.color = 'var(--maroon)';
                    tableTitle.style.marginBottom = '15px';
                    bubble.appendChild(tableTitle);
            
                    const table = createAssignmentTable(assignments);
                    bubble.appendChild(table);
                }
            } else {
                // Plain text for user messages
                bubble.textContent = text;
            }

            messageDiv.appendChild(bubble);
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }


        function createAssignmentTable(data) {
            const tableDiv = document.createElement('div');
            tableDiv.className = 'results-table';
            
            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Sector</th>
                        <th>Project</th>
                        <th>Task</th>
                        <th>Employee Name</th>
                        <th>Position</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.flatMap(row => 
                        (row.employees && row.employees.length > 0 
                            ? row.employees 
                            : [{ name: "No match found", position: "—", email: "" }]
                        ).map(emp => `
                            <tr>
                                <td><strong>${row.sector}</strong></td>
                                <td>${row.project}</td>
                                <td>${row.task}</td>
                                <td>${emp.name}</td>
                                <td>${emp.position}</td>
                                <td>
                                    ${emp.email 
                                        ? `<a href="mailto:${emp.email}" style="color: var(--crimson);">${emp.email}</a>` 
                                        : "—"}
                                </td>
                            </tr>
                        `)
                    ).join('')}
                </tbody>
            `;
            
            tableDiv.appendChild(table);
            return tableDiv;
        }

        function addThinkingBubble() {
            const messagesArea = document.getElementById('messagesArea');
            const thinkingDiv = document.createElement('div');
            const id = 'thinking-' + Date.now();
            thinkingDiv.id = id;
            thinkingDiv.className = 'message agent';

            const bubble = document.createElement('div');
            bubble.className = 'thinking-bubble';
            bubble.innerHTML = `Thinking<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>`;

            thinkingDiv.appendChild(bubble);
            messagesArea.appendChild(thinkingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            return id;
        }

        function removeThinkingBubble(id) {
            const bubble = document.getElementById(id);
            if (bubble) bubble.remove();
        }
    </script>
</body>
</html>
